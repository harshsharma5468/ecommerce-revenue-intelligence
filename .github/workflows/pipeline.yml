name: Revenue Intelligence Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:

# ------------------------------------------------
# JOB 1 — CODE QUALITY
# ------------------------------------------------
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov black isort

      - name: Lint (flake8)
        run: |
          flake8 src main_pipeline.py \
          --max-line-length=120 \
          --extend-ignore=E221,E231,E225,E302,E305,E306,E701,E712,E127,E128,E131,E402,F541,F841,W503

      - name: Check formatting (black)
        run: black --check src main_pipeline.py || true

      - name: Check import sorting
        run: isort --check-only src main_pipeline.py || true

      - name: Run tests
        run: |
          pytest tests -v --cov=src --cov-report=xml --cov-report=term
        continue-on-error: true


# ------------------------------------------------
# JOB 2 — RUN PIPELINE
# ------------------------------------------------
  pipeline:
    name: Run Data Pipeline
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dataset
        run: |
          if [ ! -f "data/raw/olist_orders_dataset.csv" ]; then
            echo "Generating datasets..."
            python scripts/generate_datasets.py
          fi

      - name: Run full pipeline
        run: |
          python main_pipeline.py --layer ingest
          python main_pipeline.py --layer rfm
          python main_pipeline.py --layer anomaly
          python main_pipeline.py --layer forecast
          python main_pipeline.py --layer cohort

      - name: Validate outputs
        run: |
          python - <<EOF
          import sys
          from pathlib import Path

          files = [
              "data/processed/master_dataset.csv",
              "data/processed/rfm_segments.csv",
              "data/processed/anomaly_detection.csv",
              "data/processed/revenue_forecast.csv",
              "data/processed/cohort_retention.csv",
          ]

          missing = [f for f in files if not Path(f).exists()]

          if missing:
              print("Missing files:", missing)
              sys.exit(1)

          print("All pipeline outputs exist.")
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: data/processed
          retention-days: 30


# ------------------------------------------------
# JOB 3 — DASHBOARD TEST
# ------------------------------------------------
  dashboard-test:
    name: Dashboard Smoke Test
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dashboard deps
        run: |
          pip install -r requirements.txt
          pip install dash plotly

      - name: Test dashboard
        run: |
          python - <<EOF
          import sys
          sys.path.insert(0,"src")

          from dashboard.app import create_app

          print("Dashboard imported successfully")
          EOF


# ------------------------------------------------
# JOB 4 — DEPLOY
# ------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [pipeline, dashboard-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: |
          echo "Deployment would run here"
          echo "Pipeline completed successfully."
          echo "Dashboard tests passed."
          echo "Ready to deploy to production."
